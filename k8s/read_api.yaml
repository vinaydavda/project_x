apiVersion: apps/v1
kind: Deployment
metadata:
  name: read-api
  namespace: event-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: read-api
  template:
    metadata:
      labels:
        app: read-api
    spec:
      nodeSelector:
        node-type: worker
      containers:
        - name: read-api
          image: vinaydavda7/event_system_x:latest
          command: ["uvicorn"]
          args: ["main:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
---
apiVersion: v1
kind: Service
metadata:
  name: read-api-service
  namespace: event-platform
spec:
  selector:
    app: read-api
  ports:
    - port: 8001
      targetPort: 8001