apiVersion: apps/v1
kind: Deployment
metadata:
  name: write-api
  namespace: event-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: write-api
  template:
    metadata:
      labels:
        app: write-api
    spec:
      nodeSelector:
        node-type: worker
      containers:
        - name: write-api
          image: vinaydavda7/event_system_x:latest
          command: ["uvicorn"]
          args: ["main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
---
apiVersion: v1
kind: Service
metadata:
  name: write-api-service
  namespace: event-platform
spec:
  selector:
    app: write-api
  ports:
    - port: 8000
      targetPort: 8000